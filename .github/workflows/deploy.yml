# GitHub Actions workflow to deploy static site to GitHub Pages
name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Inject BASE_URL into config.js
        env:
          RG_BASE_URL_VAR: ${{ vars.RG_BASE_URL }}
          RG_BASE_URL_SECRET: ${{ secrets.RG_BASE_URL }}
        run: |
          BASE_URL="${RG_BASE_URL_VAR:-$RG_BASE_URL_SECRET}"

          if [ -z "$BASE_URL" ]; then
            echo "RG_BASE_URL not set in vars or secrets. Keeping default BASE_URL from config.js"
            exit 0
          fi

          ESCAPED_BASE_URL=$(printf '%s\n' "$BASE_URL" | sed -e 's/[\/&]/\\&/g')
          sed -i "s|BASE_URL: \".*\"|BASE_URL: \"$ESCAPED_BASE_URL\"|" config.js

          echo "Injected BASE_URL into config.js"
          grep -n "BASE_URL" config.js

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
